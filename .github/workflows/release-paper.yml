name: release-paper
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install Tectonic
        run: |
          sudo apt-get update
          sudo apt-get install -y tectonic
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate figures/tables/text (best-effort)
        run: |
          python paper/scripts/make_figures_final.py || true
          python paper/scripts/make_tables_final.py || true
          python paper/scripts/make_results_text.py || true
      - name: Build main.pdf
        run: tectonic -X compile paper/main.tex --outdir paper/_build
      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: main-pdf
          path: paper/_build/main.pdf
          if-no-files-found: error
      - name: Upload to GitHub Release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: paper/_build/main.pdf
